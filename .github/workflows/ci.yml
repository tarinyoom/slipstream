name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ninja-build curl zip unzip tar pkg-config

      - name: Install vcpkg
        run: |
          git clone --depth 1 --branch 2025.04.09 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Build C++
        run: |
          cmake -B build \
            -DSLIPSTREAM_BUILD_OPENVDB=OFF \
            -DSLIPSTREAM_BUILD_CUDA=OFF
          cmake --build build

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

      - name: Smoke test CLI
        run: |
          build/slipstream single_emitter --cpu
          test "$(ls frames/*.ppm | wc -l)" -eq 120

  build-cuda:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.2.1-devel-ubuntu24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y cmake build-essential ninja-build git curl zip unzip tar pkg-config

      - name: Install vcpkg
        run: |
          git clone --depth 1 --branch 2025.04.09 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Build C++ with CUDA
        run: |
          cmake -B build \
            -DSLIPSTREAM_BUILD_OPENVDB=OFF \
            -DCMAKE_CUDA_ARCHITECTURES=all-major
          cmake --build build
