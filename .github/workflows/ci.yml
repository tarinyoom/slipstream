name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libgtest-dev python3-dev python3-pip

      - name: Build C++
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

      - name: Install Python dependencies
        run: |
          pip install --break-system-packages nanobind scikit-build-core numpy pytest

      - name: Build Python package
        run: pip install --break-system-packages --no-build-isolation -e .

      - name: Run Python tests
        run: pytest

      - name: Run examples
        run: |
          python3 examples/smoke_plume.py
          python3 examples/cavity.py
