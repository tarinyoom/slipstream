name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  openvdb:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ninja-build curl zip unzip tar pkg-config

      - name: Install vcpkg (Linux)
        if: runner.os == 'Linux'
        run: |
          git clone --branch 2025.04.09 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Install vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --branch 2025.04.09 https://github.com/microsoft/vcpkg "$env:USERPROFILE\vcpkg"
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Enable vcpkg binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',     process.env.ACTIONS_CACHE_URL);
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN);
            core.exportVariable('VCPKG_BINARY_SOURCES',  'clear;x-gha,readwrite');

      - name: Configure
        run: cmake -B build -DSLIPSTREAM_BUILD_CUDA=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure --build-config Release

      - name: Smoke test (PPM)
        shell: bash
        run: ./build/slipstream single_emitter --cpu

      - name: Smoke test (VDB)
        shell: bash
        run: ./build/slipstream single_emitter --cpu --vdb

  cuda-build:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.2.1-devel-ubuntu24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y cmake build-essential ninja-build git curl zip unzip tar pkg-config

      - name: Install vcpkg
        run: |
          git clone --branch 2025.04.09 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Enable vcpkg binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',     process.env.ACTIONS_CACHE_URL);
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN);
            core.exportVariable('VCPKG_BINARY_SOURCES',  'clear;x-gha,readwrite');

      - name: Configure
        run: |
          cmake -B build \
            -DSLIPSTREAM_BUILD_CUDA=ON \
            -DSLIPSTREAM_BUILD_OPENVDB=OFF \
            -DCMAKE_CUDA_ARCHITECTURES=all-major

      - name: Build
        run: cmake --build build --config Release
